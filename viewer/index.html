<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Innovatiebudget 2026 3DBAG onderdoorgangen</title>
  <link rel="stylesheet" href="./cesium/Widgets/widgets.css" />
  <style>
    html, body, #cesiumContainer {
      width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
    }
    body { background: #000; color: #eee; }
    #toolbar {
      position: absolute; top: 10px; left: 10px; right: auto; z-index: 10;
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    }
    #toolbar input, #toolbar select {
      padding: 8px 10px; border: 1px solid #444; border-radius: 4px;
      background: rgba(0, 0, 0, .75); color: #eee; font-size: 14px;
      outline: none;
    }
    #toolbar input:focus, #toolbar select:focus { border-color: #6ab0de; }
    #url-input { flex: 1; }
    #token-input { width: 200px; }
    .field {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 10px; border: 1px solid #444; border-radius: 4px;
      background: rgba(0, 0, 0, .75); color: #eee; font-size: 14px;
      white-space: nowrap;
    }
    .field label {
      color: #cfd7df;
    }
    .field select {
      padding: 0;
      border: 0;
      background: transparent;
      min-width: 180px;
    }
    .toggle {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 10px; border: 1px solid #444; border-radius: 4px;
      background: rgba(0, 0, 0, .75); color: #eee; font-size: 14px;
      white-space: nowrap;
    }
    .toggle input {
      margin: 0;
      accent-color: #6ab0de;
    }
    #tileset-panel {
      position: absolute; top: 10px; right: 10px; z-index: 10;
      width: min(300px, calc(100vw - 20px));
      padding: 10px 12px; border: 1px solid #444; border-radius: 6px;
      background: rgba(0, 0, 0, .78); color: #eee; font-size: 13px;
      box-sizing: border-box;
    }
    #tileset-panel h2 {
      margin: 0 0 8px; font-size: 14px; font-weight: 600;
    }
    #tileset-layer-list {
      display: flex; flex-direction: column; gap: 6px;
    }
    #tileset-layer-list select {
      width: 100%;
      padding: 8px 10px; border: 1px solid #444; border-radius: 4px;
      background: rgba(0, 0, 0, .75); color: #eee; font-size: 14px;
      outline: none;
    }
    #tileset-layer-list select:focus { border-color: #6ab0de; }
    #tileset-layer-list .hint {
      color: #cfd7df;
      line-height: 1.4;
    }
    .tileset-layer {
      display: grid; grid-template-columns: 16px 1fr; align-items: center; gap: 8px;
      min-height: 22px;
    }
    .tileset-layer input {
      margin: 0;
      accent-color: #6ab0de;
    }
    .tileset-layer span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    button {
      padding: 8px 14px; border: 1px solid #444; border-radius: 4px;
      background: #2c3e50; color: #eee; cursor: pointer; font-size: 14px;
    }
    button:hover { background: #34495e; }
    #toolbar > :not(#zoom-btn) {
      display: none;
    }
    #inspect-panel {
      position: absolute; left: 10px; bottom: 38px; z-index: 30;
      width: min(520px, calc(100vw - 20px)); max-height: 62vh; overflow: auto;
      padding: 12px 14px; border: 1px solid #444; border-radius: 6px;
      background: rgba(0, 0, 0, .78); color: #eee; font-size: 13px;
      box-sizing: border-box;
    }
    #inspect-panel h2 {
      margin: 0 0 8px; font-size: 14px; font-weight: 600;
    }
    #inspect-panel .hint {
      color: #cfd7df;
      line-height: 1.4;
    }
    #inspect-panel .section {
      margin-top: 10px;
    }
    #inspect-panel .label {
      display: inline-block; min-width: 92px; color: #cfd7df;
    }
    #inspect-panel table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      margin-top: 6px;
    }
    #inspect-panel th,
    #inspect-panel td {
      padding: 5px 0;
      border-top: 1px solid rgba(255, 255, 255, .14);
      text-align: left;
      vertical-align: top;
      overflow-wrap: anywhere;
    }
    #inspect-panel th {
      width: 42%;
      padding-right: 10px;
      color: #cfd7df;
      font-weight: 500;
    }
    #underpass-legend {
      position: absolute; right: 10px; bottom: 38px; z-index: 10;
      width: 220px;
      padding: 10px 12px; border: 1px solid #444; border-radius: 6px;
      background: rgba(0, 0, 0, .78); color: #eee; font-size: 13px;
      box-sizing: border-box;
    }
    #underpass-legend[hidden] { display: none; }
    #underpass-legend h2 {
      margin: 0 0 8px; font-size: 14px; font-weight: 600;
    }
    .legend-row {
      display: flex; align-items: center; gap: 8px;
      margin-top: 6px;
    }
    .legend-swatch {
      width: 14px; height: 14px; border-radius: 3px;
      border: 1px solid rgba(255, 255, 255, .45);
      flex: 0 0 auto;
    }
    .legend-swatch.streetlidar-success { background: #1f7a3a; }
    .legend-swatch.success { background: #8fd694; }
    .legend-swatch.other { background: #ffffff; }
    .legend-swatch.failed { background: #f08f8f; }
    @media (max-width: 900px) {
      #toolbar { right: 10px; top: 152px; }
      #toolbar { top: 10px; right: auto; }
      #url-input { flex-basis: 100%; }
      #tileset-panel { top: 52px; left: 10px; right: 10px; width: auto; }
      #inspect-panel { right: 10px; width: auto; }
      #underpass-legend { left: 10px; right: 10px; bottom: 180px; width: auto; }
    }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>

  <div id="toolbar">
    <input id="url-input" type="text"
           placeholder="Tileset URL from data/tilesets.json" />
    <input id="token-input" type="text"
           placeholder="Ion token (optional)" />
    <div class="field">
      <label for="terrain-select">Terrain</label>
      <select id="terrain-select">
        <option value="none">None</option>
        <option value="cesium">Cesium World Terrain</option>
        <option value="pdok">PDOK Quantized Mesh</option>
      </select>
    </div>
    <label class="toggle" for="underpass-color-toggle">
      <input id="underpass-color-toggle" type="checkbox" />
      Underpass colors
    </label>
    <button id="load-btn">Load</button>
    <button id="zoom-btn">Zoom to tileset</button>
  </div>

  <div id="tileset-panel">
    <h2>Tilesets</h2>
    <div id="tileset-layer-list"></div>
  </div>

  <div id="inspect-panel">
    <h2>Inspector</h2>
    <div id="inspect-content" class="hint">Click the globe, terrain, or a 3D Tiles feature to inspect coordinates.</div>
  </div>

  <div id="underpass-legend" hidden>
    <h2>Legenda</h2>
    <div class="legend-row"><span class="legend-swatch streetlidar-success"></span><span>bevat overhang (streetlidar)</span></div>
    <div class="legend-row"><span class="legend-swatch success"></span><span>bevat overhang (aanname h=2.5m)</span></div>
    <div class="legend-row"><span class="legend-swatch other"></span><span>geen overhang gedetecteerd</span></div>
    <div class="legend-row"><span class="legend-swatch failed"></span><span>fout in overhang verwerking</span></div>
  </div>

  <script>window.CESIUM_BASE_URL = "./cesium/";</script>
  <script src="./cesium/Cesium.js"></script>
  <script type="module" src="./main.js"></script>
</body>
</html>
